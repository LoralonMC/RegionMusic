# RegionMusic Configuration
# ========================
#
# ============================================================
# PLACEHOLDERAPI PLACEHOLDERS
# ============================================================
# If PlaceholderAPI is installed, the following placeholders are available:
#
#   %regionmusic_enabled%          - "true" if music is enabled for player, "false" if disabled
#   %regionmusic_toggled%          - "true" if music is toggled OFF (inverse of enabled)
#   %regionmusic_playing%          - "true" if music is currently playing
#   %regionmusic_sound%            - Current sound key (e.g., "minecraft:music_disc.cat")
#   %regionmusic_region%           - Current region name
#   %regionmusic_world%            - Current world name
#   %regionmusic_volume%           - Current effective volume as percentage (e.g., "80")
#   %regionmusic_volume_decimal%   - Current effective volume as decimal (e.g., "0.80")
#   %regionmusic_volume_personal%  - Player's personal volume setting (0-100)
#   %regionmusic_track%            - Current track display name (or sound key if no name set)
#   %regionmusic_variant%          - Active variant (night/rain/thunder) or empty
#
# These are useful for custom menus (e.g., DeluxeMenus) to show music status or create toggle buttons.

# ============================================================
# GENERAL SETTINGS
# ============================================================

# How often to check player positions (in ticks, 20 ticks = 1 second)
check-interval: 10

# Whether to check regions on these events (can disable for performance)
events:
  player-join: true
  player-teleport: true
  player-respawn: true
  player-change-world: true

# Debug mode - logs region enter/exit events to console
debug: false

# Delay (in ticks) before starting music when transitioning between music regions.
# Only applies to region-to-region transitions (not silence-to-music or variant changes).
# Set to 0 for instant transitions.
transition-delay: 0

# Stop vanilla Minecraft background music before playing region music.
# Uses stopSound(Source.MUSIC) to silence ambient music.
stop-vanilla-music: false

# ============================================================
# REGIONS
# ============================================================
# Format:
#   regions:
#     <world_name>:
#       <region_name>:
#         sound: "namespace:sound.name"  # Required - the sound to play
#         name: "Display Name"            # Optional - friendly name shown to players (defaults to sound key)
#         volume: 1.0                     # Required - volume from 0.0 to 1.0
#         loop: true                      # Required - whether to loop the music
#         duration: 180                   # Required if loop=true - duration in seconds before looping
#         category: MUSIC                 # Optional - sound category (default: MUSIC)
#         priority: 10                    # Optional - override WorldGuard region priority for music
#
# Playlist format (alternative to single sound):
#   regions:
#     <world_name>:
#       <region_name>:
#         volume: 0.8
#         loop: true
#         order: shuffle                  # Optional - sequential (default) or shuffle
#         sounds:
#           - sound: "minecraft:music_disc.cat"
#             name: "Cat"
#             duration: 186
#           - sound: "minecraft:music_disc.far"
#             name: "Far"
#             duration: 174
#
# Time/weather variant format (under any region):
#   regions:
#     <world_name>:
#       <region_name>:
#         sound: "custom:music.day_theme"
#         duration: 240
#         volume: 1.0
#         loop: true
#         variants:
#           night:                         # Plays during night (13000-23000 ticks)
#             sound: "custom:music.night"
#             duration: 200
#           rain:                          # Plays during rain
#             sound: "custom:music.rain"
#             duration: 180
#           thunder:                       # Plays during thunderstorms (highest priority)
#             sound: "custom:music.storm"
#             duration: 160
#
# Variants can also use the sounds: list format for playlists.
# Variant priority: thunder > rain > night > default
#
# Sound categories: MASTER, MUSIC, RECORD, WEATHER, BLOCK, HOSTILE, NEUTRAL, PLAYER, AMBIENT, VOICE
#
# Priority: By default, the plugin uses WorldGuard's region priority to determine which music plays
#           when a player is in multiple regions. You can override this per-region with the priority field.
#           Higher priority = takes precedence.
#
# Sound can be:
#   - A custom sound from your resource pack (e.g., "custom:music.forest_theme")
#   - A vanilla music disc (e.g., "minecraft:music_disc.cat")
#   - Any vanilla sound event (e.g., "minecraft:music.creative")
#
# Vanilla music disc sounds and their durations:
#   - minecraft:music_disc.11      (71 seconds)
#   - minecraft:music_disc.13      (178 seconds)
#   - minecraft:music_disc.blocks  (345 seconds)
#   - minecraft:music_disc.cat     (186 seconds)
#   - minecraft:music_disc.chirp   (185 seconds)
#   - minecraft:music_disc.far     (174 seconds)
#   - minecraft:music_disc.mall    (197 seconds)
#   - minecraft:music_disc.mellohi (96 seconds)
#   - minecraft:music_disc.pigstep (149 seconds)
#   - minecraft:music_disc.stal    (150 seconds)
#   - minecraft:music_disc.strad   (188 seconds)
#   - minecraft:music_disc.wait    (238 seconds)
#   - minecraft:music_disc.ward    (251 seconds)
#   - minecraft:music_disc.otherside (195 seconds)
#   - minecraft:music_disc.5       (178 seconds)
#   - minecraft:music_disc.relic   (218 seconds)
#   - minecraft:music_disc.precipice (299 seconds)
#   - minecraft:music_disc.creator (176 seconds)
#   - minecraft:music_disc.creator_music_box (73 seconds)

regions:
  world:
    example_region:
      sound: "minecraft:music_disc.cat"
      name: "Cat"
      volume: 0.8
      loop: true
      duration: 186
      category: RECORD
