# RegionMusic Configuration
# ========================
# All messages support MiniMessage format: https://docs.advntr.dev/minimessage/format.html
#
# ============================================================
# PLACEHOLDERAPI PLACEHOLDERS
# ============================================================
# If PlaceholderAPI is installed, the following placeholders are available:
#
#   %regionmusic_enabled%          - "true" if music is enabled for player, "false" if disabled
#   %regionmusic_toggled%          - "true" if music is toggled OFF (inverse of enabled)
#   %regionmusic_playing%          - "true" if music is currently playing
#   %regionmusic_sound%            - Current sound key (e.g., "minecraft:music_disc.cat")
#   %regionmusic_region%           - Current region name
#   %regionmusic_world%            - Current world name
#   %regionmusic_volume%           - Current effective volume as percentage (e.g., "80")
#   %regionmusic_volume_decimal%   - Current effective volume as decimal (e.g., "0.80")
#   %regionmusic_volume_personal%  - Player's personal volume setting (0-100)
#   %regionmusic_track%            - Current track display name (or sound key if no name set)
#   %regionmusic_variant%          - Active variant (night/rain/thunder) or empty
#
# These are useful for custom menus (e.g., DeluxeMenus) to show music status or create toggle buttons.

# ============================================================
# GENERAL SETTINGS
# ============================================================

# How often to check player positions (in ticks, 20 ticks = 1 second)
check-interval: 10

# Whether to check regions on these events (can disable for performance)
events:
  player-join: true
  player-teleport: true
  player-respawn: true
  player-change-world: true

# Debug mode - logs region enter/exit events to console
debug: false

# Delay (in ticks) before starting music when transitioning between music regions.
# Only applies to region-to-region transitions (not silence-to-music or variant changes).
# Set to 0 for instant transitions.
transition-delay: 0

# Stop vanilla Minecraft background music before playing region music.
# Uses stopSound(Source.MUSIC) to silence ambient music.
stop-vanilla-music: false

# How to display "now playing" and "music stopped" messages.
# Options: chat, actionbar, title, none
now-playing-display: chat
music-stopped-display: none

# ============================================================
# MESSAGES
# ============================================================
# All messages use MiniMessage format
# Available placeholders use <placeholder> syntax (listed in comments)
# Set a message to "" to disable it

messages:
  # Prefix added to standard plugin messages
  prefix: "<#6C757D>[<#6B7A5E>ᴍᴜꜱɪᴄ<#6C757D>] "

  # Prefix used for error messages (replaces the standard prefix)
  error-prefix: "<#6C757D>[<#C27B6B>ᴇʀʀᴏʀ<#6C757D>] "

  # Shown when config is reloaded
  # Placeholders: <count> = number of regions loaded
  config-reloaded: "<#f2ebd7>Configuration <#8FAA87>reloaded<#f2ebd7>! <#FCD472><count><#f2ebd7> region(s) loaded."

  # Shown when config reload fails validation
  reload-failed: "<#C27B6B>Configuration reload failed! Check console for details."

  # Shown when player doesn't have permission
  no-permission: "<#C27B6B>You don't have permission to use this command."

  # Shown for unknown subcommand
  # Placeholders: <command> = the unknown command entered
  unknown-command: "<#C27B6B>Unknown subcommand: <#FCD472><command><#C27B6B>. Use <#FCD472>/regionmusic help<#C27B6B> for usage."

  # Shown when target player is not found
  player-not-found: "<#C27B6B>Player not found."

  # Now playing message (shown when entering a region with music)
  # Placeholders: <region>, <world>, <sound>
  # Set to "" to disable
  now-playing: "<#f2ebd7>Now playing: <#FCD472><sound> <#6C757D>(<region>)"

  # Music stopped message (shown when leaving a music region)
  # Placeholders: <region>, <world>
  # Set to "" to disable
  music-stopped: "<#f2ebd7>Music stopped."

  # Toggle messages (for yourself)
  music-enabled: "<#f2ebd7>Region music <#8FAA87>enabled<#f2ebd7>."
  music-disabled: "<#f2ebd7>Region music <#C27B6B>disabled<#f2ebd7>."

  # Toggle messages (admin toggling for another player)
  # Placeholders: <player>
  music-enabled-for: "<#f2ebd7>Region music <#8FAA87>enabled<#f2ebd7> for <#FCD472><player><#f2ebd7>."
  music-disabled-for: "<#f2ebd7>Region music <#C27B6B>disabled<#f2ebd7> for <#FCD472><player><#f2ebd7>."

  # Volume messages
  # Placeholders: <volume> = volume percentage (0-100)
  volume-set: "<#f2ebd7>Music volume set to <#FCD472><volume>%<#f2ebd7>."
  volume-current: "<#f2ebd7>Your music volume is <#FCD472><volume>%<#f2ebd7>."
  # Placeholders: <player>, <volume>
  volume-set-for: "<#f2ebd7>Music volume set to <#FCD472><volume>%<#f2ebd7> for <#FCD472><player><#f2ebd7>."

  # Preview messages
  # Placeholders: <sound>
  preview-started: "<#f2ebd7>Previewing: <#FCD472><sound><#f2ebd7>."
  preview-stopped: "<#f2ebd7>Preview stopped."
  preview-not-playing: "<#f2ebd7>No preview is playing."

  # List command messages
  list-header: "<#6C757D>═══════ <#6B7A5E>Configured Regions <#6C757D>═══════"
  # Placeholders: <world>
  list-world-header: "<#FCD472><world><#6C757D>:"
  # Placeholders: <region>, <sound>
  list-entry: "  <#6C757D>- <#f2ebd7><region><#6C757D>: <#FCD472><sound>"
  list-entry-current: "  <#8FAA87>► <#f2ebd7><region><#6C757D>: <#FCD472><sound> <#6C757D>(current)"
  list-empty: "<#f2ebd7>No regions configured."

  # Discovery message (shown the first time a player enters a music region)
  # Placeholders: <region>, <world>
  # Set to "" to disable
  region-discovered: "<#f2ebd7>New area discovered: <#FCD472><region><#f2ebd7>!"

  # Admin help command
  help-header: "<#6C757D>═══════ <#6B7A5E>RegionMusic Help <#6C757D>═══════"
  help-reload: "<#FCD472>/regionmusic reload <#6C757D>- <#f2ebd7>Reload the configuration"
  help-toggle: "<#FCD472>/regionmusic toggle [on|off] <#6C757D>- <#f2ebd7>Toggle music on/off"
  help-toggle-player: "<#FCD472>/regionmusic toggle <player> [on|off] <#6C757D>- <#f2ebd7>Toggle music for a player"
  help-status: "<#FCD472>/regionmusic status <#6C757D>- <#f2ebd7>Show current music status"
  help-status-player: "<#FCD472>/regionmusic status <player> <#6C757D>- <#f2ebd7>Show a player's music status"
  help-volume: "<#FCD472>/regionmusic volume <#6C757D>- <#f2ebd7>Show your music volume"
  help-volume-set: "<#FCD472>/regionmusic volume <0-100> <#6C757D>- <#f2ebd7>Set your music volume"
  help-volume-player: "<#FCD472>/regionmusic volume <player> <0-100> <#6C757D>- <#f2ebd7>Set a player's volume"
  help-preview: "<#FCD472>/regionmusic preview <sound> [volume] <#6C757D>- <#f2ebd7>Preview a sound"
  help-preview-stop: "<#FCD472>/regionmusic preview stop <#6C757D>- <#f2ebd7>Stop previewing"
  help-list: "<#FCD472>/regionmusic list <#6C757D>- <#f2ebd7>List configured regions"
  help-help: "<#FCD472>/regionmusic help <#6C757D>- <#f2ebd7>Show this help message"

  # Player help command (non-admin)
  player-help-header: "<#6C757D>═══════ <#6B7A5E>RegionMusic <#6C757D>═══════"
  player-help-toggle: "<#FCD472>/regionmusic toggle [on|off] <#6C757D>- <#f2ebd7>Toggle music on/off"
  player-help-status: "<#FCD472>/regionmusic status <#6C757D>- <#f2ebd7>Show current music"
  player-help-volume: "<#FCD472>/regionmusic volume [0-100] <#6C757D>- <#f2ebd7>Show or set your volume"

  # Status command messages
  # Placeholders: <region>, <world>, <sound>, <volume>
  status-playing: "<#f2ebd7>Currently playing: <#FCD472><sound> <#6C757D>in region <#FCD472><region> <#6C757D>(<world>)"
  status-not-playing: "<#f2ebd7>No music currently playing."

  # Status command messages for checking other players (admin)
  # Placeholders: <player>, <region>, <world>, <sound>, <volume>
  status-playing-for: "<#FCD472><player> <#f2ebd7>is listening to: <#FCD472><sound> <#6C757D>in region <#FCD472><region> <#6C757D>(<world>)"
  status-not-playing-for: "<#FCD472><player> <#f2ebd7>has no music playing."

# ============================================================
# REGIONS
# ============================================================
# Format:
#   regions:
#     <world_name>:
#       <region_name>:
#         sound: "namespace:sound.name"  # Required - the sound to play
#         name: "Display Name"            # Optional - friendly name shown to players (defaults to sound key)
#         volume: 1.0                     # Required - volume from 0.0 to 1.0
#         loop: true                      # Required - whether to loop the music
#         duration: 180                   # Required if loop=true - duration in seconds before looping
#         category: MUSIC                 # Optional - sound category (default: MUSIC)
#         priority: 10                    # Optional - override WorldGuard region priority for music
#
# Playlist format (alternative to single sound):
#   regions:
#     <world_name>:
#       <region_name>:
#         volume: 0.8
#         loop: true
#         order: shuffle                  # Optional - sequential (default) or shuffle
#         sounds:
#           - sound: "minecraft:music_disc.cat"
#             name: "Cat"
#             duration: 186
#           - sound: "minecraft:music_disc.far"
#             name: "Far"
#             duration: 174
#
# Time/weather variant format (under any region):
#   regions:
#     <world_name>:
#       <region_name>:
#         sound: "custom:music.day_theme"
#         duration: 240
#         volume: 1.0
#         loop: true
#         variants:
#           night:                         # Plays during night (13000-23000 ticks)
#             sound: "custom:music.night"
#             duration: 200
#           rain:                          # Plays during rain
#             sound: "custom:music.rain"
#             duration: 180
#           thunder:                       # Plays during thunderstorms (highest priority)
#             sound: "custom:music.storm"
#             duration: 160
#
# Variants can also use the sounds: list format for playlists.
# Variant priority: thunder > rain > night > default
#
# Sound categories: MASTER, MUSIC, RECORD, WEATHER, BLOCK, HOSTILE, NEUTRAL, PLAYER, AMBIENT, VOICE
#
# Priority: By default, the plugin uses WorldGuard's region priority to determine which music plays
#           when a player is in multiple regions. You can override this per-region with the priority field.
#           Higher priority = takes precedence.
#
# Sound can be:
#   - A custom sound from your resource pack (e.g., "custom:music.forest_theme")
#   - A vanilla music disc (e.g., "minecraft:music_disc.cat")
#   - Any vanilla sound event (e.g., "minecraft:music.creative")
#
# Vanilla music disc sounds and their durations:
#   - minecraft:music_disc.11      (71 seconds)
#   - minecraft:music_disc.13      (178 seconds)
#   - minecraft:music_disc.blocks  (345 seconds)
#   - minecraft:music_disc.cat     (186 seconds)
#   - minecraft:music_disc.chirp   (185 seconds)
#   - minecraft:music_disc.far     (174 seconds)
#   - minecraft:music_disc.mall    (197 seconds)
#   - minecraft:music_disc.mellohi (96 seconds)
#   - minecraft:music_disc.pigstep (149 seconds)
#   - minecraft:music_disc.stal    (150 seconds)
#   - minecraft:music_disc.strad   (188 seconds)
#   - minecraft:music_disc.wait    (238 seconds)
#   - minecraft:music_disc.ward    (251 seconds)
#   - minecraft:music_disc.otherside (195 seconds)
#   - minecraft:music_disc.5       (178 seconds)
#   - minecraft:music_disc.relic   (218 seconds)
#   - minecraft:music_disc.precipice (299 seconds)
#   - minecraft:music_disc.creator (176 seconds)
#   - minecraft:music_disc.creator_music_box (73 seconds)

regions:
  world:
    example_region:
      sound: "minecraft:music_disc.cat"
      name: "Cat"
      volume: 0.8
      loop: true
      duration: 186
      category: RECORD
